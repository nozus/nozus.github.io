<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nozus | Join the Exchange</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-container">
    <div class="auth-card animate-fade-in">
        <div class="logo mb-2" style="font-size: 3rem;">nozus</div>
        <h2 id="auth-title" class="mb-1">Log In</h2>
        <p class="text-secondary mb-2" id="auth-subtitle">Welcome back to the exchange.</p>
        
        <form id="form-auth">
            <input type="text" id="auth-username" required placeholder="Username">
            <input type="password" id="auth-password" required placeholder="Password">
            <button type="submit" class="btn btn-primary w-full" style="padding: 0.75rem;">Continue</button>
        </form>
        
        <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border);">
        
        <button id="btn-toggle-auth" class="btn btn-secondary w-full" style="padding: 0.75rem;">
            Create New Account
        </button>
        
        <div class="mt-2">
            <a href="index.html" class="text-dim text-sm" style="text-decoration: none;">Back to Market</a>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';

        let isSignUp = false;
        const els = {
            form: document.getElementById('form-auth'),
            title: document.getElementById('auth-title'),
            subtitle: document.getElementById('auth-subtitle'),
            toggleBtn: document.getElementById('btn-toggle-auth'),
            username: document.getElementById('auth-username'),
            password: document.getElementById('auth-password')
        };

        const toInternalEmail = (username) => `${username.toLowerCase()}@nozus.internal`;

        els.toggleBtn.onclick = () => {
            isSignUp = !isSignUp;
            els.title.innerText = isSignUp ? 'Sign Up' : 'Log In';
            els.subtitle.innerText = isSignUp ? 'Join the future of personal equity.' : 'Welcome back to the exchange.';
            els.toggleBtn.innerText = isSignUp ? 'Already have an account?' : 'Create New Account';
        };

        els.form.onsubmit = async (e) => {
            e.preventDefault();
            const username = els.username.value;
            const password = els.password.value;
            const email = toInternalEmail(username);

            try {
                let res;
                if (isSignUp) {
                    res = await supabase.auth.signUp({ 
                        email, 
                        password, 
                        options: { data: { username } } 
                    });
                    
                    if (res.error) throw res.error;
                    
                    // Create profile
                    const { error: pError } = await supabase
                        .from('profiles')
                        .insert([{ id: res.data.user.id, username, points: 1000 }]);
                    
                    if (pError) throw pError;
                    alert('Account created! Logging you in...');
                } else {
                    res = await supabase.auth.signInWithPassword({ email, password });
                    if (res.error) throw res.error;
                }

                // Redirect to home
                window.location.href = 'index.html';
            } catch (err) {
                console.error(err);
                alert(err.message || 'Failed to connect to Supabase. Check your internet or project status.');
            }
        };
    </script>
</body>
</html>
