<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nozus. | login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #000000;
            --bg-page: #ffffff;
            --text-main: #000000;
            --border: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-transform: lowercase;
        }

        body {
            font-family: 'Inter', Helvetica, sans-serif;
            font-weight: 700;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-page);
            color: var(--text-main);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .card {
            border: 4px solid var(--border);
            padding: 3rem 2rem;
            background: var(--bg-page);
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            opacity: 0.7;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: var(--bg-page);
            border: 2px solid var(--border);
            padding: 1rem;
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            outline: none;
        }

        input:focus {
            background: #fff;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--border);
            color: var(--bg-page);
            border: none;
            font-weight: 900;
            font-size: 1.25rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #fff;
            color: var(--border);
            border: 2px solid var(--border);
        }

        .toggle-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
        }

        .toggle-link {
            font-weight: 900;
            cursor: pointer;
            text-decoration: underline;
        }

        .error-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border: 2px solid #000;
            color: red;
            font-size: 0.8rem;
            display: none;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="card">
            <div class="logo">nozus.</div>
            <p class="subtitle" id="auth-subtitle">simplistic exchange.</p>

            <form id="auth-form">
                <div class="input-group">
                    <label>username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label>password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required>
                        <span id="toggle-password-visibility"
                            style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 0.7rem; font-weight: 900;">show</span>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="btn-submit">login</button>
            </form>

            <div class="error-box" id="error-display"></div>

            <p class="toggle-text">
                <span id="toggle-desc">no account?</span>
                <span class="toggle-link" id="toggle-auth">create one</span>
            </p>
        </div>
    </div>

    <script type="module">
        import CONFIG from './config.js?v=2';

        const { createClient } = window.supabase;
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        let isSignUp = false;
        const els = {
            form: document.getElementById('auth-form'),
            submitBtn: document.getElementById('submit-btn'),
            toggleLink: document.getElementById('toggle-auth'),
            toggleDesc: document.getElementById('toggle-desc'),
            errorDisplay: document.getElementById('error-display'),
            username: document.getElementById('username'),
            password: document.getElementById('password'),
            togglePass: document.getElementById('toggle-password-visibility')
        };

        els.togglePass.onclick = () => {
            const isPass = els.password.type === 'password';
            els.password.type = isPass ? 'text' : 'password';
            els.togglePass.innerText = isPass ? 'hide' : 'show';
        };

        els.toggleLink.onclick = () => {
            isSignUp = !isSignUp;
            els.submitBtn.innerText = isSignUp ? 'create account' : 'login';
            els.toggleDesc.innerText = isSignUp ? 'already have an account?' : "no account?";
            els.toggleLink.innerText = isSignUp ? 'login' : 'create one';
            els.errorDisplay.style.display = 'none';
        };

        els.form.onsubmit = async (e) => {
            e.preventDefault();
            els.submitBtn.disabled = true;
            els.errorDisplay.style.display = 'none';

            const user = els.username.value.trim();
            const pass = els.password.value;
            const email = `${user.toLowerCase()}@nozus-exchange.com`;

            try {
                let res;
                if (isSignUp) {
                    res = await supabase.auth.signUp({
                        email,
                        password: pass,
                        options: { data: { username: user } }
                    });
                    if (res.error) throw res.error;

                    try {
                        await supabase.from('profiles').insert([{ id: res.data.user.id, username: user, points: 1000 }]);
                    } catch (pE) { console.warn("Profile init failed:", pE); }

                    alert("Account Created!");
                } else {
                    res = await supabase.auth.signInWithPassword({ email, password: pass });
                    if (res.error) throw res.error;
                }

                window.location.href = 'index.html';
            } catch (err) {
                console.error("AUTH ERROR:", err);
                els.errorDisplay.innerHTML = err.message || "Unknown error.";
                els.errorDisplay.style.display = 'block';
            } finally {
                els.submitBtn.disabled = false;
            }
        };
    </script>
</body>

</html>
