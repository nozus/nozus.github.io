<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nozus. | Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-main);
        }
        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .logo-auth {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .input-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-main);
            transition: all 0.2s;
        }
        .input-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        .password-container {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
        }
        .password-toggle:hover {
            color: var(--text-main);
        }
        .error-box {
            background: rgba(239, 68, 68, 0.1);
            color: var(--negative);
            border: 1px solid var(--negative);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-top: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .toggle-link {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-auth">
                <i data-lucide="activity" style="width:36px;height:36px;"></i> nozus.
            </div>
            <p class="auth-subtitle" id="auth-subtitle">Welcome to the market.</p>

            <form id="auth-form">
                <div class="input-group">
                    <label style="display:block;margin-bottom:0.5rem;font-weight:600;color:var(--text-muted);font-size:0.9rem;">Username</label>
                    <input type="text" id="username" class="input-control" required>
                </div>
                <div class="input-group">
                    <label style="display:block;margin-bottom:0.5rem;font-weight:600;color:var(--text-muted);font-size:0.9rem;">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" class="input-control" required>
                        <i data-lucide="eye" class="password-toggle" id="toggle-password-visibility"></i>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary w-full" style="padding: 0.8rem; font-size: 1rem;">Log In</button>
            </form>

            <div class="error-box" id="error-display"></div>

            <p class="mt-4 text-sm text-muted">
                <span id="toggle-desc">No account?</span>
                <span class="toggle-link" id="toggle-auth">Create one</span>
            </p>
        </div>
    </div>

    <script type="module">
        import CONFIG from './config.js?v=2';

        const { createClient } = window.supabase;
        const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        lucide.createIcons();

        let isSignUp = false;
        const els = {
            form: document.getElementById('auth-form'),
            submitBtn: document.getElementById('submit-btn'),
            toggleLink: document.getElementById('toggle-auth'),
            toggleDesc: document.getElementById('toggle-desc'),
            errorDisplay: document.getElementById('error-display'),
            username: document.getElementById('username'),
            password: document.getElementById('password'),
            togglePass: document.getElementById('toggle-password-visibility')
        };

        els.togglePass.onclick = () => {
            const isPass = els.password.type === 'password';
            els.password.type = isPass ? 'text' : 'password';
            els.togglePass.setAttribute('data-lucide', isPass ? 'eye-off' : 'eye');
            lucide.createIcons();
        };

        els.toggleLink.onclick = () => {
            isSignUp = !isSignUp;
            els.submitBtn.innerText = isSignUp ? 'Create Account' : 'Log In';
            els.toggleDesc.innerText = isSignUp ? 'Already have an account?' : "No account?";
            els.toggleLink.innerText = isSignUp ? 'Log in' : 'Create one';
            els.errorDisplay.style.display = 'none';
        };

        els.form.onsubmit = async (e) => {
            e.preventDefault();
            els.submitBtn.disabled = true;
            els.errorDisplay.style.display = 'none';

            const user = els.username.value.trim();
            const pass = els.password.value;
            const email = `${user.toLowerCase()}@nozus-exchange.com`;

            try {
                let res;
                if (isSignUp) {
                    res = await supabase.auth.signUp({
                        email,
                        password: pass,
                        options: { data: { username: user } }
                    });
                    if (res.error) throw res.error;

                    try {
                        await supabase.from('profiles').insert([{ id: res.data.user.id, username: user, points: 1000 }]);
                    } catch (pE) { console.warn("Profile init failed:", pE); }

                    alert("Account Created! You can now log in.");
                } else {
                    res = await supabase.auth.signInWithPassword({ email, password: pass });
                    if (res.error) throw res.error;
                }

                window.location.href = 'index.html';
            } catch (err) {
                console.error("AUTH ERROR:", err);
                els.errorDisplay.innerHTML = err.message || "Unknown error.";
                els.errorDisplay.style.display = 'block';
            } finally {
                els.submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
