<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nozus | The Modern Exchange</title>
    <link rel="icon" type="image/png" href="nozus_logo_favicon_1778476398592.png">
    <link rel="stylesheet" href="style.css">
    <!-- Redirect ASAP if not logged in -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './supabase-client.js';
        const check = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) window.location.href = 'auth.html';
        };
        check();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="logo">nozus</div>
            <div class="user-pill" id="user-display" style="display: none;">
                <div class="flex align-center gap-1">
                    <img id="nav-avatar" src="" style="width: 32px; height: 32px; border-radius: 50%; display: none;">
                    <div id="nav-initials" class="btn" style="width: 32px; height: 32px; border-radius: 50%; background: var(--border); font-size: 12px;">U</div>
                    <span id="nav-username" class="font-bold">Username</span>
                    <span id="user-points" class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">0 pts</span>
                </div>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <div class="nav-link active" id="view-market">
                    <i data-lucide="layout-grid"></i> <span>Market</span>
                </div>
                <div class="nav-link" id="view-portfolio">
                    <i data-lucide="pie-chart"></i> <span>Portfolio</span>
                </div>
                <div class="nav-link" id="view-leaderboard">
                    <i data-lucide="trophy"></i> <span>Leaderboard</span>
                </div>
                <hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--border);">
                <div class="nav-link" id="btn-launch">
                    <i data-lucide="plus-circle"></i> <span>Launch Currency</span>
                </div>
                <div class="nav-link" id="btn-settings">
                    <i data-lucide="settings"></i> <span>Settings</span>
                </div>
            </nav>
            <div style="margin-top: auto;">
                <button id="btn-logout" class="btn btn-ghost w-full">Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="ticker">
                <div class="ticker-content" id="ticker-data">
                    <span style="margin-right: 2rem;">NZUS <b style="color: var(--accent)">10.00</b></span>
                </div>
            </div>

            <div id="view-title-area" class="mb-2">
                <h1 id="main-title">Market</h1>
                <p id="main-subtitle" class="text-muted">Live performance of personal currencies.</p>
            </div>

            <div id="market-area" class="card">
                <table class="data-table">
                    <thead>
                        <tr><th>Symbol</th><th>Name</th><th>Price</th><th>Action</th></tr>
                    </thead>
                    <tbody id="market-body">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>

            <!-- Other views hidden by default -->
            <div id="portfolio-area" class="card" style="display: none;">
                <table class="data-table">
                    <thead><tr><th>Asset</th><th>Shares</th><th>Value</th></tr></thead>
                    <tbody id="portfolio-body"></tbody>
                </table>
            </div>

            <div id="leaderboard-area" class="card" style="display: none;">
                <table class="data-table">
                    <thead><tr><th>Rank</th><th>Investor</th><th>Points</th></tr></thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-settings" class="modal-overlay">
        <div class="modal card" style="width: 100%; max-width: 400px; margin: auto;">
            <h3 class="mb-2">Settings</h3>
            <form id="form-settings">
                <div class="input-field"><label>Avatar URL</label><input type="text" id="set-avatar"></div>
                <div class="input-field"><label>Banner URL</label><input type="text" id="set-banner"></div>
                <button type="submit" class="btn btn-primary w-full">Save Changes</button>
                <button type="button" class="btn btn-ghost w-full mt-1 btn-close">Cancel</button>
            </form>
        </div>
    </div>

    <div id="modal-launch" class="modal-overlay">
        <div class="modal card" style="width: 100%; max-width: 400px; margin: auto;">
            <h3 class="mb-2">Launch Currency</h3>
            <form id="form-launch">
                <div class="input-field"><label>Currency Name</label><input type="text" id="launch-name" required placeholder="e.g. Nozus Coin"></div>
                <div class="input-field"><label>Ticker Symbol (4 Letters)</label><input type="text" id="launch-symbol" required maxlength="4" minlength="4" placeholder="NZUS"></div>
                <button type="submit" class="btn btn-primary w-full">Launch Currency</button>
                <button type="button" class="btn btn-ghost w-full mt-1 btn-close">Cancel</button>
            </form>
        </div>
    </div>

    <div id="modal-trade" class="modal-overlay">
        <div class="modal card" style="width: 100%; max-width: 400px; margin: auto;">
            <h3 id="trade-title" class="mb-2">Trade</h3>
            <div class="flex justify-between mb-2"><span>Price</span><span id="trade-price" class="font-bold">0 pts</span></div>
            <div class="input-field"><label>Amount</label><input type="number" id="trade-amount" value="1" min="1"></div>
            <button id="btn-confirm-trade" class="btn btn-primary w-full">Execute Trade</button>
            <button type="button" class="btn btn-ghost w-full mt-1 btn-close">Cancel</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
