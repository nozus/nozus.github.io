<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nozus. | Leaderboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './supabase-client.js';
        const check = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) window.location.href = 'auth.html';
        };
        check();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <i data-lucide="activity"></i> nozus.
        </div>
        <div class="search-bar-container">
            <!-- Hidden search bar to keep alignment -->
        </div>
        <div id="user-display" style="display: none;">
            <div class="user-dropdown" onclick="window.location.href='profile.html'">
                <div id="nav-icon-slot"></div>
                <span id="nav-username" class="font-bold">User</span>
                <span id="user-points" class="points-badge">0 pts</span>
            </div>
        </div>
    </header>

    <div class="ticker-tape">
        <div class="ticker-tape-content" id="global-ticker"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav>
                <div class="nav-item" onclick="window.location.href='index.html'">
                    <i data-lucide="line-chart"></i> Markets
                </div>
                <div class="nav-item" onclick="window.location.href='profile.html'">
                    <i data-lucide="user"></i> Portfolio
                </div>
                <div class="nav-item active" onclick="window.location.href='leaderboard.html'">
                    <i data-lucide="trophy"></i> Leaderboard
                </div>
            </nav>
            <div class="mt-4 pt-4 border-t" style="border-top: 1px solid var(--border);">
                <div class="nav-item text-negative" id="btn-logout">
                    <i data-lucide="log-out"></i> Sign Out
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="mb-4">
                <h1 class="text-2xl font-black">Top Investors</h1>
                <p class="text-muted">Global leaderboard ranked by total wealth.</p>
            </div>
            <div class="card p-0" style="padding: 0; overflow: hidden;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Investor</th>
                            <th class="text-right">Net Worth</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr><td colspan="3" class="text-center py-2 text-muted">Loading rankings...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';
        import { renderIcon } from './icons.js';

        const $ = (id) => document.getElementById(id);

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { window.location.href = 'auth.html'; return; }

            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                $('user-display').style.display = 'block';
                $('nav-username').innerText = profile.username;
                $('user-points').innerText = `${profile.points.toLocaleString()} pts`;
                $('nav-icon-slot').innerHTML = renderIcon(profile.equipped_icon || 'nozus_default', 24);
            }

            const { data: leaders } = await supabase.from('profiles').select('*').order('points', { ascending: false }).limit(20);
            const body = $('leaderboard-body');
            if (leaders) {
                body.innerHTML = leaders.map((u, i) => `
                    <tr>
                        <td><span class="rank-badge rank-${i < 3 ? i + 1 : 'other'}">#${i + 1}</span></td>
                        <td>
                            <div class="flex align-center gap-1">
                                ${renderIcon(u.equipped_icon || 'nozus_default', 32)}
                                <span class="font-bold">${u.username}</span>
                            </div>
                        </td>
                        <td class="font-bold text-right">${Math.floor(u.points).toLocaleString()} pts</td>
                    </tr>
                `).join('');
            }
            await updateTicker();
            lucide.createIcons();

            $('btn-logout').onclick = async () => {
                await supabase.auth.signOut();
                window.location.href = 'auth.html';
            };
        }

        async function updateTicker() {
            const { data } = await supabase.from('currencies').select('*');
            const el = $('global-ticker');
            if (!data || data.length === 0) {
                el.innerHTML = '<span class="ticker-item">No active markets</span>';
                return;
            }
            const items = data.map(c => {
                return `<span class="ticker-item">${c.symbol} <b>${parseFloat(c.current_price).toFixed(2)}</b></span>`;
            }).join('');
            el.innerHTML = items + items + items;
        }

        init();
    </script>
</body>
</html>
