<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nozus. | My Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './supabase-client.js';
        const check = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) window.location.href = 'auth.html';
        };
        check();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-hero {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            background: white;
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .icon-cell {
            background: var(--bg-main);
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .icon-cell.unlocked:hover {
            border-color: var(--accent);
            background: white;
            box-shadow: var(--shadow-md);
        }
        .icon-cell.equipped {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.05);
        }
        .icon-cell-name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        .equipped-badge {
            position: absolute;
            top: -8px;
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.1rem 0.4rem;
            border-radius: var(--radius-full);
        }
        .locked-badge {
            position: absolute;
            top: -8px;
            background: var(--text-muted);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.1rem 0.4rem;
            border-radius: var(--radius-full);
        }
        .icon-cell.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }
        .icon-rarity-header {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .rarity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <i data-lucide="activity"></i> nozus.
        </div>
        <div class="search-bar-container"></div>
        <div id="user-display">
            <div class="user-dropdown">
                <div id="nav-icon-slot"></div>
                <span id="nav-username" class="font-bold">User</span>
            </div>
        </div>
    </header>

    <div class="ticker-tape">
        <div class="ticker-tape-content" id="global-ticker"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav>
                <div class="nav-item" onclick="window.location.href='index.html'">
                    <i data-lucide="line-chart"></i> Markets
                </div>
                <div class="nav-item active" onclick="window.location.href='profile.html'">
                    <i data-lucide="user"></i> Portfolio
                </div>
                <div class="nav-item" onclick="window.location.href='leaderboard.html'">
                    <i data-lucide="trophy"></i> Leaderboard
                </div>
            </nav>
            <div class="mt-4 pt-4 border-t" style="border-top: 1px solid var(--border);">
                <div class="nav-item text-negative" id="btn-logout">
                    <i data-lucide="log-out"></i> Sign Out
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="profile-hero">
                <div id="profile-icon-display" style="width: 80px; height: 80px;"></div>
                <div>
                    <h1 id="profile-username" class="text-2xl font-black">username</h1>
                    <p id="profile-points" class="text-muted font-bold text-lg">1,000 pts</p>
                </div>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 300px; gap: 2rem;">
                <!-- Icon Collection -->
                <div class="card">
                    <h3 class="mb-1">Icon Collection</h3>
                    <p class="text-muted text-xs mb-4">Tap an unlocked icon to equip it.</p>
                    
                    <div id="icon-section-common"></div>
                    <div id="icon-section-rare"></div>
                    <div id="icon-section-epic"></div>
                    <div id="icon-section-legendary"></div>
                </div>

                <!-- Stats -->
                <div>
                    <div class="card mb-4">
                        <h3 class="mb-4">Equipped Identity</h3>
                        <div class="flex align-center gap-2" id="equipped-display">
                            <div id="equipped-icon-slot"></div>
                            <div>
                                <p id="equipped-name" class="font-bold">nozus. og</p>
                                <p id="equipped-rarity" class="text-xs font-bold" style="text-transform: uppercase;">common</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';
        import { ICONS, RARITY_COLORS, RARITY_LABELS, renderIcon } from './icons.js';

        let user, profile;
        const $ = (id) => document.getElementById(id);

        async function init() {
            const { data } = await supabase.auth.getUser();
            if (!data.user) { window.location.href = 'auth.html'; return; }
            user = data.user;
            await refresh();
            setupListeners();
            await updateTicker();
            lucide.createIcons();
        }

        async function updateTicker() {
            const { data } = await supabase.from('currencies').select('symbol, current_price');
            const el = $('global-ticker');
            if (!data || data.length === 0) {
                el.innerHTML = '<span class="ticker-item">No active markets</span>';
                return;
            }
            const items = data.map(c => `<span class="ticker-item">${c.symbol} <b>${parseFloat(c.current_price).toFixed(2)}</b></span>`).join('');
            el.innerHTML = items + items + items;
        }

        async function refresh() {
            let { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (!data) return;
            profile = data;

            // Nav
            $('nav-username').innerText = profile.username;
            const equippedId = profile.equipped_icon || 'nozus_default';
            $('nav-icon-slot').innerHTML = renderIcon(equippedId, 24);

            // Profile hero
            $('profile-icon-display').innerHTML = renderIcon(equippedId, 80);
            $('profile-username').innerText = profile.username;
            $('profile-points').innerText = `${profile.points.toLocaleString()} pts`;

            // Equipped card
            const eIcon = ICONS[equippedId] || ICONS['nozus_default'];
            $('equipped-icon-slot').innerHTML = renderIcon(equippedId, 48);
            $('equipped-name').innerText = eIcon.name;
            $('equipped-rarity').innerText = RARITY_LABELS[eIcon.rarity];
            $('equipped-rarity').style.color = RARITY_COLORS[eIcon.rarity];

            // Render icon collection
            renderIconGrid();
        }

        function renderIconGrid() {
            const groups = { common: [], rare: [], epic: [], legendary: [] };
            for (const [id, icon] of Object.entries(ICONS)) {
                groups[icon.rarity].push({ id, ...icon });
            }

            for (const [rarity, icons] of Object.entries(groups)) {
                const section = $('icon-section-' + rarity);
                if (!section || icons.length === 0) continue;
                const equipped = profile.equipped_icon || 'nozus_default';
                section.innerHTML = `
                    <div class="icon-rarity-header" style="color: ${RARITY_COLORS[rarity]}">
                        <span class="rarity-dot" style="background: ${RARITY_COLORS[rarity]}"></span>
                        ${RARITY_LABELS[rarity]}
                    </div>
                    <div class="icon-grid">
                        ${icons.map(ic => {
                            const locked = !ic.free;
                            const isEquipped = ic.id === equipped;
                            return \`
                                <div class="icon-cell ${locked ? 'locked' : 'unlocked'} ${isEquipped ? 'equipped' : ''}"
                                     data-icon-id="${ic.id}" ${!locked ? 'style="cursor:pointer"' : ''}>
                                    ${renderIcon(ic.id, 40, locked)}
                                    <span class="icon-cell-name">${ic.name}</span>
                                    ${isEquipped ? '<span class="equipped-badge">EQUIPPED</span>' : ''}
                                    ${locked ? '<span class="locked-badge">LOCKED</span>' : ''}
                                </div>
                            \`;
                        }).join('')}
                    </div>
                `;
            }
        }

        function setupListeners() {
            $('btn-logout').onclick = async () => {
                await supabase.auth.signOut();
                window.location.href = 'auth.html';
            };

            document.addEventListener('click', async (e) => {
                const cell = e.target.closest('.icon-cell.unlocked');
                if (!cell) return;
                const iconId = cell.dataset.iconId;
                if (!iconId || iconId === profile.equipped_icon) return;

                const { error } = await supabase.from('profiles').update({ equipped_icon: iconId }).eq('id', user.id);
                if (error) { alert(error.message); return; }
                await refresh();
            });
        }

        init();
    </script>
</body>
</html>
