<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nozus. | My Profile</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="logo">nozus.</div>
            <div class="user-pill" id="user-display">
                <div class="flex align-center gap-1">
                    <div id="nav-icon-slot"></div>
                    <span id="nav-username" class="font-bold">Username</span>
                </div>
            </div>
        </header>

        <aside class="sidebar">
            <nav>
                <a href="index.html" class="nav-link">
                    <i data-lucide="layout-grid"></i> <span>Market</span>
                </a>
                <a href="profile.html" class="nav-link active">
                    <i data-lucide="user"></i> <span>Profile</span>
                </a>
                <hr style="margin: 1rem 0; border: none; border-top: 1px solid var(--border);">
                <button id="btn-logout" class="btn btn-ghost w-full" style="justify-content: flex-start; padding: 1rem;">
                    <i data-lucide="log-out"></i> <span>Sign Out</span>
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Profile Header -->
            <div class="profile-hero">
                <div id="profile-icon-display"></div>
                <h1 id="profile-username" class="profile-name">Username</h1>
                <p id="profile-points" class="text-muted font-bold">1,000 pts</p>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 300px; gap: 2rem;">
                <!-- Icon Collection -->
                <div class="card">
                    <h3 class="mb-1">Icon Collection</h3>
                    <p class="text-muted text-xs mb-2">Tap an unlocked icon to equip it.</p>
                    
                    <div id="icon-section-common"></div>
                    <div id="icon-section-rare"></div>
                    <div id="icon-section-epic"></div>
                    <div id="icon-section-legendary"></div>
                </div>

                <!-- Stats -->
                <div>
                    <div class="card mb-2">
                        <h3 class="mb-2">Stats</h3>
                        <div class="p-1 mb-1" style="background: var(--bg-page); border-radius: 12px;">
                            <p class="text-xs text-dim uppercase font-bold">Total Wealth</p>
                            <p id="stat-points" class="font-bold" style="font-size: 1.5rem;">1,000 pts</p>
                        </div>
                    </div>
                    <div class="card">
                        <h3 class="mb-2">Equipped</h3>
                        <div class="flex align-center gap-1" id="equipped-display">
                            <div id="equipped-icon-slot"></div>
                            <div>
                                <p id="equipped-name" class="font-bold">nozus. OG</p>
                                <p id="equipped-rarity" class="text-xs" style="text-transform: uppercase; letter-spacing: 0.05em;">Common</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';
        import { ICONS, RARITY_COLORS, RARITY_LABELS, renderIcon } from './icons.js';

        let user, profile;

        async function init() {
            const { data } = await supabase.auth.getUser();
            if (!data.user) { window.location.href = 'auth.html'; return; }
            user = data.user;
            await refresh();
            setupListeners();
            lucide.createIcons();
        }

        async function refresh() {
            let { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (!data) {
                const username = user.user_metadata?.username || 'user_' + user.id.substring(0, 8);
                const { data: np } = await supabase.from('profiles')
                    .insert([{ id: user.id, username: username, points: 1000, equipped_icon: 'nozus_default' }])
                    .select().single();
                data = np;
            }
            if (!data) return;
            profile = data;

            // Nav
            document.getElementById('nav-username').innerText = profile.username;
            const equippedId = profile.equipped_icon || 'nozus_default';
            document.getElementById('nav-icon-slot').innerHTML = renderIcon(equippedId, 32);

            // Profile hero
            document.getElementById('profile-icon-display').innerHTML = renderIcon(equippedId, 100);
            document.getElementById('profile-username').innerText = profile.username;
            document.getElementById('profile-points').innerText = `${profile.points.toLocaleString()} pts`;
            document.getElementById('stat-points').innerText = `${profile.points.toLocaleString()} pts`;

            // Equipped card
            const eIcon = ICONS[equippedId] || ICONS['nozus_default'];
            document.getElementById('equipped-icon-slot').innerHTML = renderIcon(equippedId, 56);
            document.getElementById('equipped-name').innerText = eIcon.name;
            document.getElementById('equipped-rarity').innerText = RARITY_LABELS[eIcon.rarity];
            document.getElementById('equipped-rarity').style.color = RARITY_COLORS[eIcon.rarity];

            // Render icon collection
            renderIconGrid();
        }

        function renderIconGrid() {
            const groups = { common: [], rare: [], epic: [], legendary: [] };
            for (const [id, icon] of Object.entries(ICONS)) {
                groups[icon.rarity].push({ id, ...icon });
            }

            for (const [rarity, icons] of Object.entries(groups)) {
                const section = document.getElementById(`icon-section-${rarity}`);
                if (!section || icons.length === 0) continue;
                const equipped = profile.equipped_icon || 'nozus_default';
                section.innerHTML = `
                    <div class="icon-rarity-header" style="color: ${RARITY_COLORS[rarity]}">
                        <span class="rarity-dot" style="background: ${RARITY_COLORS[rarity]}"></span>
                        ${RARITY_LABELS[rarity]}
                    </div>
                    <div class="icon-grid">
                        ${icons.map(ic => {
                            const locked = !ic.free;
                            const isEquipped = ic.id === equipped;
                            return `
                                <div class="icon-cell ${locked ? 'locked' : 'unlocked'} ${isEquipped ? 'equipped' : ''}"
                                     data-icon-id="${ic.id}" ${!locked ? 'style="cursor:pointer"' : ''}>
                                    ${renderIcon(ic.id, 56, locked)}
                                    <span class="icon-cell-name">${ic.name}</span>
                                    ${isEquipped ? '<span class="equipped-badge">EQUIPPED</span>' : ''}
                                    ${locked ? '<span class="locked-badge">LOCKED</span>' : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
        }

        function setupListeners() {
            document.getElementById('btn-logout').onclick = async () => {
                await supabase.auth.signOut();
                window.location.href = 'auth.html';
            };

            // Equip icon on click
            document.addEventListener('click', async (e) => {
                const cell = e.target.closest('.icon-cell.unlocked');
                if (!cell) return;
                const iconId = cell.dataset.iconId;
                if (!iconId || iconId === profile.equipped_icon) return;

                const { error } = await supabase.from('profiles').update({ equipped_icon: iconId }).eq('id', user.id);
                if (error) { alert(error.message); return; }
                await refresh();
            });
        }

        init();
    </script>
</body>
</html>
